name: hiking_assistant
description: AI-powered hiking assistant app

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.4.9

  # 路由
  go_router: ^14.0.0

  # HTTP 请求
  http: ^1.2.0

  # UI

  # 地图
  flutter_map: ^7.0.0
  latlong2: ^0.9.0

  # 位置服务
  geolocator: ^13.0.0
  geocoding: ^3.0.0

  cupertino_icons: ^1.0.8

  # 本地存储
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  path: ^1.9.0

  # URL 启动
  url_launcher: ^6.2.5

  # 分享
  share_plus: ^10.0.0

  # 元数据注解
  meta: ^1.11.0
  flutter_markdown_plus: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  sqflite_common_ffi: ^2.3.2

flutter:
  uses-material-design: true
